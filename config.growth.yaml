# Агрессивный пресет: цель ~$250 за ~4 мес (120d бэктест).
# ВНИМАНИЕ: на 365d истории −49%, просадка до ~20% на 120d.
# Только paper / малый депозит, пока не проверишь вживую.

symbol: BTC/USDT
timeframe: 15m
candle_limit: 250

leverage: 15
risk_per_trade: 0.07
max_balance_pct: 0.60
min_trade_btc: 0.001

stop_loss_pct: 0.009
take_profit_pct: 0.016

max_open_positions: 1
cooldown_minutes: 45

strategy:
  mode: classic
  ema_fast: 50
  ema_slow: 200
  adx_min: 22
  min_atr_pct: 0.0025
  max_atr_pct: 0.02
  stoch_oversold: 30
  stoch_overbought: 70
  support_buffer_pct: 0.002
  volume_factor: 0.85
  use_htf_filter: false

exit:
  breakeven_trigger_pct: 0
  trail_trigger_pct: 0

loop_seconds: 60
